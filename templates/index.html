<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS — Consulta de Productos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #222535;
      --border:    #2e3248;
      --accent:    #6c8cff;
      --accent2:   #4ade80;
      --warn:      #facc15;
      --danger:    #f87171;
      --text:      #e2e6f3;
      --muted:     #7880a4;
      --radius:    10px;
      --shadow:    0 4px 20px rgba(0,0,0,.45);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .5px;
      white-space: nowrap;
    }
    header h1 span { color: var(--text); font-weight: 400; }

    .stats-bar {
      display: flex;
      gap: 20px;
      margin-left: auto;
      font-size: .78rem;
      color: var(--muted);
    }
    .stats-bar strong { color: var(--text); }

    /* ── Search panel ── */
    .search-panel {
      max-width: 900px;
      margin: 28px auto 0;
      padding: 0 16px;
    }

    .search-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .search-box {
      flex: 1;
      position: relative;
    }
    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    .search-box input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--muted); }

    .mode-group {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .mode-btn {
      padding: 10px 16px;
      font-size: .82rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .mode-btn.active {
      background: var(--accent);
      color: #fff;
    }
    .mode-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

    .clear-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--muted);
      cursor: pointer;
      font-size: .85rem;
      transition: color .15s, border-color .15s;
    }
    .clear-btn:hover { color: var(--danger); border-color: var(--danger); }

    .search-hint {
      margin-top: 8px;
      font-size: .75rem;
      color: var(--muted);
      padding-left: 4px;
    }

    /* ── Results header ── */
    .results-header {
      max-width: 900px;
      margin: 20px auto 10px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .82rem;
      color: var(--muted);
    }

    /* ── Cards grid ── */
    .grid {
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .card-accent-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity .2s;
    }
    .card:hover .card-accent-bar { opacity: 1; }

    .card-group {
      font-size: .7rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-name {
      font-size: .92rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 10px;
      color: var(--text);
    }

    .card-prices {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .price-main {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--accent2);
      line-height: 1;
    }
    .price-sin-iva {
      font-size: .78rem;
      color: var(--muted);
      align-self: flex-end;
      margin-bottom: 2px;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .7rem;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .badge-cost     { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .badge-markup   { background: #1a2e1a; color: var(--accent2); border: 1px solid #2d4a2d; }
    .badge-tax      { background: #2d2010; color: var(--warn);   border: 1px solid #4a3510; }
    .badge-code     { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-stock    { background: #162128; color: #38bdf8; border: 1px solid #1e3a4a; }
    .badge-nostock  { background: #2a1515; color: var(--danger);  border: 1px solid #4a1f1f; }
    .badge-unit     { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .badge-active   { background: #142414; color: #4ade80; border: 1px solid #1e4020; }
    .badge-inactive { background: #1e1010; color: #a0a0b0; border: 1px solid #3a2020; }

    /* ── Inactive card ── */
    .card.inactive {
      opacity: .55;
      border-color: #232535;
    }
    .card.inactive .price-main { color: var(--muted); }
    .card.inactive .card-group { color: var(--muted); }
    .card.inactive:hover { opacity: .8; border-color: var(--muted); }
    .card.inactive .card-accent-bar { background: var(--muted); }

    /* ── Status filter ── */
    .status-group {
      display: flex;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 10px;
    }
    .status-btn {
      padding: 7px 14px;
      font-size: .78rem;
      font-weight: 600;
      background: transparent;
      color: var(--muted);
      border: none;
      cursor: pointer;
      transition: background .15s, color .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .status-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-btn[data-enabled="all"]      .dot { background: var(--muted); }
    .status-btn[data-enabled="1"]        .dot { background: #4ade80; }
    .status-btn[data-enabled="0"]        .dot { background: #a0a0b0; }
    .status-btn.active { background: var(--surface2); color: var(--text); }
    .status-btn[data-enabled="1"].active { color: #4ade80; }
    .status-btn[data-enabled="0"].active { color: #a0a0b0; }
    .status-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

    /* ── Empty / loader ── */
    .empty {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 16px;
      text-align: center;
      color: var(--muted);
    }
    .empty svg { margin-bottom: 16px; opacity: .35; }
    .empty p { font-size: .9rem; }

    .loader {
      text-align: center;
      padding: 60px 16px;
      color: var(--muted);
      font-size: .9rem;
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
      transform: translateY(12px);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      float: right;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color .15s;
    }
    .modal-close:hover { color: var(--danger); }

    .modal-group { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--accent); margin-bottom: 6px; }
    .modal-name  { font-size: 1.25rem; font-weight: 700; line-height: 1.3; margin-bottom: 20px; }

    .modal-prices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .price-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .price-block label { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 4px; }
    .price-block .val  { font-size: 1.4rem; font-weight: 700; color: var(--accent2); }
    .price-block.secondary .val { color: var(--text); font-size: 1.1rem; }
    .price-block.cost-block .val { color: #94a3b8; font-size: 1.1rem; }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .info-row { background: var(--surface2); border-radius: 8px; padding: 10px 14px; }
    .info-row label { font-size: .68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 3px; }
    .info-row .val { font-size: .92rem; font-weight: 600; color: var(--text); }

    .modal-barcodes { margin-bottom: 16px; }
    .modal-barcodes label { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 8px; }
    .barcode-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .barcode-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: .78rem;
      font-family: monospace;
      color: var(--text);
    }
    .no-barcodes { font-size: .82rem; color: var(--muted); }

    .modal-desc { font-size: .84rem; color: var(--muted); line-height: 1.5; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>POS <span>/ Productos</span></h1>
  <div class="stats-bar" id="statsBar">
    <span>Cargando...</span>
  </div>
</header>

<div class="search-panel">
  <div class="search-row">
    <div class="search-box">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="searchInput" type="text" placeholder="Buscar productos..." autocomplete="off" autofocus />
    </div>

    <div class="mode-group">
      <button class="mode-btn active" data-mode="name">Nombre</button>
      <button class="mode-btn" data-mode="barcode">Código de barras</button>
      <button class="mode-btn" data-mode="code">Clave</button>
    </div>

    <button class="clear-btn" id="clearBtn" title="Limpiar">✕</button>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
    <div class="status-group">
      <button class="status-btn active" data-enabled="all">
        <span class="dot"></span>Todos <span class="cnt" style="color:var(--muted);font-weight:400"></span>
      </button>
      <button class="status-btn" data-enabled="1">
        <span class="dot"></span>Activos <span class="cnt" style="color:var(--muted);font-weight:400"></span>
      </button>
      <button class="status-btn" data-enabled="0">
        <span class="dot"></span>Inactivos <span class="cnt" style="color:var(--muted);font-weight:400"></span>
      </button>
    </div>
    <div class="search-hint" id="searchHint" style="margin-top:0">
      Búsqueda difusa por nombre de producto
    </div>
  </div>
</div>

<div class="results-header" id="resultsHeader" style="display:none">
  <span id="resultsCount"></span>
  <span id="resultsMode"></span>
</div>

<div id="content">
  <div class="empty">
    <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <p>Escribe para buscar productos por nombre, código de barras o clave interna.</p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
const searchInput   = document.getElementById('searchInput');
const clearBtn      = document.getElementById('clearBtn');
const content       = document.getElementById('content');
const resultsHeader = document.getElementById('resultsHeader');
const resultsCount  = document.getElementById('resultsCount');
const resultsMode   = document.getElementById('resultsMode');
const searchHint    = document.getElementById('searchHint');
const modalOverlay  = document.getElementById('modalOverlay');
const modalContent  = document.getElementById('modalContent');

let currentMode    = 'name';
let currentEnabled = 'all';
let debounceTimer;

// ── Stats ──────────────────────────────────────────────
fetch('/api/stats').then(r => r.json()).then(data => {
  document.getElementById('statsBar').innerHTML =
    `<span><strong>${data.active.toLocaleString()}</strong> activos</span>
     <span style="color:#a0a0b0"><strong>${data.inactive.toLocaleString()}</strong> inactivos</span>
     <span><strong>${data.groups}</strong> grupos</span>
     <span><strong>${data.withStock}</strong> con existencia</span>`;
  // update badge counts in filter buttons
  document.querySelector('.status-btn[data-enabled="all"] .cnt').textContent = data.total;
  document.querySelector('.status-btn[data-enabled="1"] .cnt').textContent   = data.active;
  document.querySelector('.status-btn[data-enabled="0"] .cnt').textContent   = data.inactive;
});

// ── Mode buttons ───────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    const hints = {
      name:    'Búsqueda difusa por nombre de producto',
      barcode: 'Búsqueda por código de barras (parcial o completo)',
      code:    'Búsqueda por clave interna del producto',
    };
    searchHint.textContent = hints[currentMode];
    if (searchInput.value.trim()) doSearch();
  });
});

// ── Status filter buttons ──────────────────────────────
document.querySelectorAll('.status-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentEnabled = btn.dataset.enabled;
    if (searchInput.value.trim()) doSearch();
  });
});

// ── Search ─────────────────────────────────────────────
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doSearch, currentMode === 'name' ? 280 : 160);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchInput.focus();
  resultsHeader.style.display = 'none';
  content.innerHTML = `
    <div class="empty">
      <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Escribe para buscar productos por nombre, código de barras o clave interna.</p>
    </div>`;
});

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) { clearBtn.click(); return; }

  content.innerHTML = '<div class="loader"><div class="spinner"></div><br>Buscando...</div>';
  resultsHeader.style.display = 'none';

  try {
    const url = `/api/search?q=${encodeURIComponent(q)}&mode=${currentMode}&enabled=${currentEnabled}&limit=80`;
    const data = await fetch(url).then(r => r.json());
    renderResults(data.results, q);
  } catch (e) {
    content.innerHTML = '<div class="empty"><p>Error al conectar con el servidor.</p></div>';
  }
}

// ── Render cards ───────────────────────────────────────
function fmt(n) {
  if (n == null || n === '') return '—';
  return Number(n).toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });
}
function fmtN(n, dec=2) {
  if (n == null) return '—';
  return Number(n).toFixed(dec);
}

function renderResults(results, query) {
  resultsHeader.style.display = 'flex';
  resultsCount.textContent = results.length === 0
    ? 'Sin resultados'
    : `${results.length} resultado${results.length !== 1 ? 's' : ''}`;
  const modeLabel = { name:'nombre', barcode:'código de barras', code:'clave' };
  resultsMode.textContent = `Búsqueda: "${query}" · modo: ${modeLabel[currentMode]}`;

  if (results.length === 0) {
    content.innerHTML = `
      <div class="empty">
        <svg width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>No se encontraron productos para "<strong>${escHtml(query)}</strong>".</p>
      </div>`;
    return;
  }

  const hasTax = results.some(r => r.TaxRate > 0);
  const cards = results.map(p => {
    const stockBadge = p.Stock > 0
      ? `<span class="badge badge-stock">📦 ${p.Stock}</span>`
      : `<span class="badge badge-nostock">Sin existencia</span>`;

    const taxBadge = p.TaxRate > 0
      ? `<span class="badge badge-tax">${p.TaxName} ${p.TaxRate}%</span>`
      : '';

    const sinIva = (p.TaxRate > 0 && !p.IsTaxInclusivePrice)
      ? ''
      : p.TaxRate > 0
        ? `<span class="price-sin-iva">Sin IVA: ${fmt(p.PriceSinIVA)}</span>`
        : '';

    const isActive = p.IsEnabled === 1;
    const statusBadge = isActive
      ? `<span class="badge badge-active">● Activo</span>`
      : `<span class="badge badge-inactive">● Inactivo</span>`;

    return `
      <div class="card${isActive ? '' : ' inactive'}" onclick="openModal(${p.Id})">
        <div class="card-accent-bar"></div>
        <div class="card-group">${escHtml(p.GroupName || 'Sin grupo')}</div>
        <div class="card-name">${highlight(escHtml(p.Name), currentMode === 'name' ? query : '')}</div>
        <div class="card-prices">
          <span class="price-main">${fmt(p.PriceConIVA)}</span>
          ${sinIva}
        </div>
        <div class="card-meta">
          ${statusBadge}
          <span class="badge badge-cost">Costo ${fmt(p.Cost)}</span>
          <span class="badge badge-markup">Margen ${fmtN(p.Margin)}%</span>
          ${taxBadge}
          <span class="badge badge-code">#${escHtml(p.Code || p.PLU || p.Id)}</span>
          ${stockBadge}
          <span class="badge badge-unit">${escHtml(p.MeasurementUnit || 'pz')}</span>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `<div class="grid">${cards}</div>`;
}

// ── Modal detail ───────────────────────────────────────
async function openModal(id) {
  modalOverlay.classList.add('open');
  modalContent.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  try {
    const p = await fetch(`/api/product/${id}`).then(r => r.json());

    const sinIvaLabel = p.IsTaxInclusivePrice ? 'Precio sin IVA' : 'Precio base';
    const conIvaLabel = p.TaxRate > 0 ? `Precio con ${p.TaxName} (${p.TaxRate}%)` : 'Precio venta';

    const barcodeHtml = p.Barcodes && p.Barcodes.length
      ? p.Barcodes.map(b => `<span class="barcode-chip">${escHtml(b)}</span>`).join('')
      : '<span class="no-barcodes">Sin códigos de barras registrados</span>';

    const descHtml = p.Description
      ? `<p class="modal-desc">${escHtml(p.Description)}</p>`
      : '';

    const markup = p.Price && p.Cost
      ? `${fmtN((p.Price - p.Cost) / p.Price * 100)}%`
      : '—';

    modalContent.innerHTML = `
      <div class="modal-group">${escHtml(p.GroupName || 'Sin grupo')}</div>
      <div class="modal-name">${escHtml(p.Name)}</div>

      <div class="modal-prices">
        <div class="price-block">
          <label>${conIvaLabel}</label>
          <div class="val">${fmt(p.PriceConIVA)}</div>
        </div>
        <div class="price-block secondary">
          <label>${sinIvaLabel}</label>
          <div class="val">${fmt(p.PriceSinIVA)}</div>
        </div>
        <div class="price-block cost-block">
          <label>Costo</label>
          <div class="val">${fmt(p.Cost)}</div>
        </div>
        <div class="price-block cost-block">
          <label>Último precio compra</label>
          <div class="val">${p.LastPurchasePrice ? fmt(p.LastPurchasePrice) : '—'}</div>
        </div>
      </div>

      <div class="modal-grid">
        <div class="info-row"><label>Margen bruto</label><div class="val">${markup}</div></div>
        <div class="info-row"><label>Markup</label><div class="val">${p.Markup ? fmtN(p.Markup) + '%' : '—'}</div></div>
        <div class="info-row"><label>Existencia</label><div class="val">${p.Stock}</div></div>
        <div class="info-row"><label>Unidad</label><div class="val">${escHtml(p.MeasurementUnit || 'pz')}</div></div>
        <div class="info-row"><label>Clave interna</label><div class="val">${escHtml(p.Code || '—')}</div></div>
        <div class="info-row"><label>PLU</label><div class="val">${p.PLU || '—'}</div></div>
        <div class="info-row"><label>Impuesto</label><div class="val">${p.TaxRate > 0 ? p.TaxName + ' ' + p.TaxRate + '%' : 'Exento'}</div></div>
        <div class="info-row"><label>Precio incluye IVA</label><div class="val">${p.IsTaxInclusivePrice ? 'Sí' : 'No'}</div></div>
        <div class="info-row" style="grid-column:1/-1"><label>Estado</label><div class="val" style="color:${p.IsEnabled ? '#4ade80' : '#a0a0b0'}">${p.IsEnabled ? '● Activo' : '● Inactivo'}</div></div>
      </div>

      <div class="modal-barcodes">
        <label>Códigos de barras</label>
        <div class="barcode-list">${barcodeHtml}</div>
      </div>

      ${descHtml}
    `;
  } catch {
    modalContent.innerHTML = '<p>Error al cargar el producto.</p>';
  }
}

document.getElementById('modalClose').addEventListener('click', closeModal);
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function closeModal() { modalOverlay.classList.remove('open'); }

// ── Helpers ────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query || !text) return text;
  const tokens = query.trim().split(/\s+/).filter(Boolean);
  if (!tokens.length) return text;
  const pattern = tokens
    .map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'))
    .join('|');
  return text.replace(
    new RegExp(`(${pattern})`, 'gi'),
    '<mark style="background:#6c8cff33;color:#a5b8ff;border-radius:2px;padding:0 2px">$1</mark>'
  );
}
</script>
